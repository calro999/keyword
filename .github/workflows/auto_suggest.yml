name: Daily Google Suggest Collector

on:
  schedule:
    # 毎日日本時間の午前8:00 (UTC 23:00) に自動実行
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-style: '3.10'
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run keyword collector
      env:
        GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
      run: |
        python suggest_explorer.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add suggested_keywords.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update suggested keywords" && git push)
